services:
  pharmacyapp.webapi:
    image: ${DOCKER_REGISTRY-}pharmacyappwebapi
    build:
      context: .
      dockerfile: PharmacyApp.WebApi/Dockerfile
    ports:
       - "5000:5000"
       - "5001:5001"
    env_file:
      - ./PharmacyApp.WebApi/.env
  postgresdb:
    image: postgres:17
    container_name: pharmacyapp-postgres-container
    restart: always
    ports:
       - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    - local_pgdata:/var/lib/postgresql/data
  pgadmin:
     image: dpage/pgadmin4
     container_name: pharmacyapp-pgadmin-container
     restart: always
     ports:
        - "5050:80"
     environment:
        PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
        PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
     volumes:
        - pgadmin-data:/var/lib/pgadmin
volumes:
   local_pgdata:
   pgadmin-data: 